<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ocultar elementos HTML</title>
</head>
<body>
	<h1>O que o JavaScript pode fazer?</h1>
	<p id="demo">O JavaScript pode ocultar os elementos do HTML.</p>

	<button style="button" onclick="document.getElementById('demo').style.display='none'">
		Clique me!
	</button>
</body>
</html>
