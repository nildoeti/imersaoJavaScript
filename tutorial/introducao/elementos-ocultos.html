<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ocultando elementos</title>
</head>
<body>
	<h1>O que o JavaScript pode fazer?</h1>
	<p id="demo" style="display: none;">Hello World</p>

	<button style="button" onclick="document.getElementById('demo').style.display='block'">
		Clique me!
	</button>
</body>
</html>
