<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Alterando estilos de elementos no HTML</title>
</head>
<body>
	<h1>O que o JavaScript pode fazer?</h1>
	<p id="demo">O JavaScript pode alterar estilos dos elementos do HTML.</p>

	<button type="button" onclick="document.getElementById('demo').style.fontSize='35px'">
		Clique me!
	</button>
</body>
</html>
