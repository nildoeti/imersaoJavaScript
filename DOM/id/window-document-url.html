<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>
            window document object
        </title>
    </head>
    <body>
        <h1>Window document object</h1>
        <h2>The URL propert</h2>

        <p id="demo"></p>

        <script>
            let url = window.document.URL;
            document.getElementById('demo').innerHTML = url;
        </script>
    </body>
</html>
