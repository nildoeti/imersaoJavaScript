<!--
    O que é o DOM?

    O Document Object Model (DOM) é uma interface de programação para os
    documentos HTML e XML. Representa a página de forma que os programas possam
    alterar a estrutura do documento, alterar o estilo e conteúdo. O DOM
    representa o documento com nós e objetos, dessa forma, as linguagens de
    programação podem se conectar à página.
    Fonte: [developer.mozilla](https://developer.mozilla.org/pt-BR/docs/Web/API/Document_Object_Model/Introduction#dom_and_javascript)
-->
